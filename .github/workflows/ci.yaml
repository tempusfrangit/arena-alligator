name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Fmt
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Check formatting
        run: mise run format

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Check clippy
        run: mise run clippy

  deny:
    name: Deny
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Run cargo deny
        run: mise run deny:check

  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Run test suite
        run: mise run test

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - name: Build and test on MSRV
        run: |
          mise run build
          mise run test:cargo

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - fmt
      - clippy
      - deny
      - tests
      - msrv

    steps:
      - name: CI passed
        run: true
