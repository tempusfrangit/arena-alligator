# =============================================================================
# arena-alligator development tasks
# =============================================================================
#
# mise is a task runner only. Tools are managed externally:
#   - Rust toolchain: rust-toolchain.toml (rustup)
#   - cargo-nextest: cargo binstall cargo-nextest
#   - cargo-deny: cargo binstall cargo-deny
#
# Run `mise tasks` to see available tasks.
# Run `mise run doctor` to check all tools are installed.
# =============================================================================

# -----------------------------------------------------------------------------
# Doctor tasks - verify tools are installed
# -----------------------------------------------------------------------------

[tasks."_doctor:base"]
hide = true
quiet = true
run = '''
#!/usr/bin/env bash
err=0
command -v cargo >/dev/null || { echo "error: cargo not found. Install: https://rustup.rs"; err=1; }
command -v rustfmt >/dev/null || { echo "error: rustfmt not found. Install: rustup component add rustfmt"; err=1; }
cargo clippy --version >/dev/null 2>&1 || { echo "error: clippy not found. Install: rustup component add clippy"; err=1; }
exit $err
'''

[tasks."_doctor:nextest"]
hide = true
quiet = true
run = '''
#!/usr/bin/env bash
command -v cargo-nextest >/dev/null || { echo "error: cargo-nextest not found. Install: cargo binstall cargo-nextest"; exit 1; }
'''

[tasks."_doctor:deny"]
hide = true
quiet = true
run = '''
#!/usr/bin/env bash
command -v cargo-deny >/dev/null || { echo "error: cargo-deny not found. Install: cargo binstall cargo-deny"; exit 1; }
'''

[tasks.doctor]
description = "Check that all development tools are installed"
run = [
    { tasks = ["_doctor:base", "_doctor:nextest", "_doctor:deny"] },
]

# -----------------------------------------------------------------------------
# Format
# -----------------------------------------------------------------------------

[tasks.format]
description = "Check formatting via cargo fmt --check"
depends = ["_doctor:base"]
run = 'cargo fmt --check'

[tasks."format:fix"]
description = "Fix formatting via cargo fmt"
depends = ["_doctor:base"]
run = 'cargo fmt'

# -----------------------------------------------------------------------------
# Lint
# -----------------------------------------------------------------------------

[tasks.lint]
description = "Run all linting tasks"
depends = ["_doctor:base"]
run = [
    { tasks = ["clippy", "format", "doc", "deny:check"] },
]

[tasks.clippy]
description = "Run clippy with warnings as errors"
depends = ["_doctor:base"]
run = 'cargo clippy --all-targets --all-features -- -D warnings'

[tasks.doc]
description = "Check docs build with no warnings"
depends = ["_doctor:base"]
run = 'RUSTDOCFLAGS="-D warnings" cargo doc --all-features --no-deps'

[tasks."clippy:fix"]
description = "Run clippy in fix mode"
depends = ["_doctor:base"]
run = 'cargo clippy --fix'

# -----------------------------------------------------------------------------
# Test
# -----------------------------------------------------------------------------

[tasks.test]
description = "Run full test suite"
depends = ["_doctor:base", "_doctor:nextest"]
run = [
    { task = "test:nextest" },
    { task = "test:all-features" },
]

[tasks."test:nextest"]
description = "Run tests with nextest"
depends = ["_doctor:base", "_doctor:nextest"]
run = 'cargo nextest run'

[tasks."test:all-features"]
description = "Run tests with all features enabled"
depends = ["_doctor:base"]
run = 'cargo test --all-features'

[tasks."test:hazmat"]
description = "Run tests with hazmat-raw-access feature"
depends = ["_doctor:base", "_doctor:nextest"]
run = 'cargo nextest run --features hazmat-raw-access'

[tasks."test:cargo"]
description = "Run tests with cargo test"
depends = ["_doctor:base"]
hide = true
run = 'cargo test'

# -----------------------------------------------------------------------------
# Specialized test runners
# -----------------------------------------------------------------------------

[tasks.miri]
description = "Run miri undefined-behavior checks"
depends = ["_doctor:base"]
run = 'cargo +nightly miri test --all-features'

[tasks.loom]
description = "Run loom concurrency model checks"
depends = ["_doctor:base"]
run = 'RUSTFLAGS="--cfg loom" cargo test --lib --features async-alloc loom -- --nocapture'

# -----------------------------------------------------------------------------
# Build & bench
# -----------------------------------------------------------------------------

[tasks.build]
description = "Build the library"
depends = ["_doctor:base"]
run = 'cargo build'

[tasks.bench]
description = "Run allocator benchmarks"
depends = ["_doctor:base"]
run = 'cargo bench --bench allocator'

[tasks."bench:extreme"]
description = "Run allocator benchmarks with EXTREME contention thread level enabled"
depends = ["_doctor:base"]
run = 'ARENA_BENCH_EXTREME=1 cargo bench --bench allocator'

# -----------------------------------------------------------------------------
# Examples
# -----------------------------------------------------------------------------

[tasks.examples]
description = "Build and run all examples"
depends = ["_doctor:base"]
run = '''
#!/usr/bin/env bash
set -euo pipefail
for ex in fixed_buffer buddy_buffer spill_buffer hazmat_fixed_raw hazmat_buddy_raw async_alloc treiber_waker; do
  echo "==> $ex"
  cargo run --all-features --example "$ex"
done
'''

# -----------------------------------------------------------------------------
# Deny
# -----------------------------------------------------------------------------

[tasks."deny:check"]
description = "Run cargo deny license and advisory checks"
depends = ["_doctor:deny"]
run = '''
if [ -n "${CI:-}" ]; then
  cargo deny check
else
  mkdir -p .cargo
  if [ ! -d .cargo/advisory-dbs ] && [ -d "$HOME/.cargo/advisory-dbs" ]; then
    cp -R "$HOME/.cargo/advisory-dbs" .cargo/advisory-dbs
  fi
  CARGO_HOME="$PWD/.cargo" cargo deny check --disable-fetch
fi
'''

# -----------------------------------------------------------------------------
# CI & publish
# -----------------------------------------------------------------------------

[tasks.ci]
description = "Run the full CI validation suite locally"
run = [
    { task = "lint" },
    { task = "test" },
]

[tasks."publish:check"]
description = "Verify the crate is ready to publish"
depends = ["_doctor:base"]
run = 'cargo package --locked --allow-dirty --offline'
