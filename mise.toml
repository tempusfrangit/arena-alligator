[tools]
"cargo-binstall" = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-deny" = "latest"

[settings]
experimental = true
lockfile = true

[tasks.format]
description = "Checks formatting via `cargo fmt --check`"
run = 'cargo fmt --check'

[tasks."format:fix"]
description = "Fixes formatting via `cargo fmt`"
run = 'cargo fmt'

[tasks.lint]
description = "Runs linting tasks"
run = [
    { tasks = [
        "clippy",
        "format",
        "deny:check",
    ] },
]

[tasks.clippy]
description = "Clippy linting"
run = 'cargo clippy --all-targets --all-features -- -D warnings'

[tasks."clippy:fix"]
description = "Clippy in 'fix' mode"
run = 'cargo clippy --fix'

[tasks.test]
description = "Run tests"
run = [
    { task = "test:nextest" },
    { task = "test:all-features" },
]

[tasks.ci]
description = "Run the release CI validation suite"
run = [
    { task = "lint" },
    { task = "test" },
]

[tasks."publish:check"]
description = "Verify the crate is ready to publish"
run = 'cargo package --locked --allow-dirty --offline'

[tasks."test:nextest"]
description = "Run tests with nextest"
run = 'cargo nextest run'

[tasks."test:all-features"]
description = "Run tests with all features enabled"
run = 'cargo test --all-features'

[tasks."test:cargo"]
description = "Run tests with `cargo test`"
hide = true
run = 'cargo test'

[tasks."deny:check"]
description = "Run `cargo deny check`"
run = '''
if [ -n "${CI:-}" ]; then
  cargo deny check
else
  mkdir -p .cargo
  if [ ! -d .cargo/advisory-dbs ] && [ -d "$HOME/.cargo/advisory-dbs" ]; then
    cp -R "$HOME/.cargo/advisory-dbs" .cargo/advisory-dbs
  fi
  CARGO_HOME="$PWD/.cargo" cargo deny check --disable-fetch
fi
'''

[tasks.build]
description = "Build arena alligator"
run = 'cargo build'

[tasks.bench]
description = "Run allocator benchmarks"
run = 'cargo bench --bench allocator'
