[package]
name = "arena-alligator"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "MIT"
description = "Lock-free arena allocator producing bytes::Bytes via from_owner"

[dependencies]
bytes = "1.9"
tokio = { version = "1", features = ["sync"], optional = true }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }

[features]
default = []
async-alloc = ["dep:tokio"]
